jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
      
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 安装中文字体
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-microhei
      
      - name: 安装 md-to-png
        run: npm install -g md-to-png
      
      - name: 渲染 README（指定中文字体）
        run: md-to-png README.md -o readme-preview.png --font "WenQuanYi Micro Hei"
      
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: readme-preview
          path: readme-preview.png
          retention-days: 7
