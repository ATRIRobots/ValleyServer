name: Render README to Image

on:
  workflow_dispatch:
  push:
    paths:
      - 'README.md'
    branches:
      - main
      - master

jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
      
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 安装中文字体
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-microhei
          fc-cache -fv
      
      - name: 安装 md-to-png 工具
        run: npm install -g md-to-png
      
      - name: 将 README.md 渲染为 PNG（支持中文）
        run: md-to-png README.md -o readme-preview.png --font="Noto Sans CJK SC"
      
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: readme-preview
          path: readme-preview.png
          retention-days: 7
