name: Render README to Web Page

on:
  workflow_dispatch:
  push:
    paths:
      - 'README.md'
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
      
      - name: 安装中文字体
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-microhei
      
      - name: 安装 md-to-png
        run: npm install -g md-to-png
      
      - name: 渲染 README
        run: md-to-png README.md -o readme-preview.png --font "WenQuanYi Micro Hei"
      
      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
