name: Render README to Image

on:
  # 手动触发
  workflow_dispatch:
  
  # 当 README.md 被 push 到 main 或 master 分支时触发
  push:
    paths:
      - 'README.md'
    branches:
      - main
      - master

jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
      
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 安装 md-to-png 工具
        run: npm install -g md-to-png
      
      - name: 将 README.md 渲染为 PNG
        run: md-to-png README.md -o readme-preview.png
      
      - name: 上传产物（保留 7 天）
        uses: actions/upload-artifact@v4
        with:
          name: readme-preview
          path: readme-preview.png
          retention-days: 7
